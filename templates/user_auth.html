<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Login / Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>
    <div id="wolf">
        <img src="{{ url_for('static', filename='images/wolf-head2.png') }}">
    </div>

    <div id="linetop"></div>
    <div id="linebottom"></div>

    <h2>User Authentication</h2>

    <div class="auth-container">
        <h2 id="form-title">Sign In</h2>
        {% if google_client_id %}
        <div class="google-auth-block">
            <div id="g_id_onload" data-client_id="{{ google_client_id }}" data-context="signup"
                data-ux_mode="popup" data-callback="handleGoogleCredential"></div>
            <div class="google-signin-label">Continue with Google</div>
            <div class="google-signin-button" id="googleSignInButton"></div>
        </div>
        <div class="auth-divider"><span>or</span></div>
        {% endif %}

        <!-- Sign In Form -->
        <form id="signin-form" class="active" action="{{ url_for('user_auth') }}" method="POST">
            <input type="hidden" name="action" value="signin">
            <input type="text" name="username" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <button type="button" class="toggle-btn" onclick="toggleForm()">Create a new account</button>
            <a href="/login" id="loginLink" style="color: white; font-size: 12px; font-weight: lighter">Admin Login</a>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" action="{{ url_for('user_auth') }}" method="POST">
            <input type="hidden" name="action" value="signup">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
            <button type="button" class="toggle-btn" onclick="toggleForm()">Already have an account?</button>
        </form>
    </div>
    {% if google_client_id %}
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    {% endif %}
    <script>
        async function handleGoogleCredential(response) {
            try {
                const res = await fetch("{{ url_for('google_auth') }}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();
                if (!data.success) {
                    alert(data.error || "Google authentication failed");
                    return;
                }

                window.location.href = data.redirect_url || "{{ url_for('index') }}";
            } catch (error) {
                console.error(error);
                alert("Google authentication failed");
            }
        }

        window.handleGoogleCredential = handleGoogleCredential;

        window.onload = function () {
            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.renderButton(
                    document.getElementById('googleSignInButton'),
                    {
                        theme: 'outline',
                        size: 'large',
                        shape: 'pill',
                        text: 'signup_with',
                        width: 290
                    }
                );
            }
        };

        function toggleForm() {
            const signInForm = document.getElementById('signin-form');
            const signUpForm = document.getElementById('signup-form');
            const title = document.getElementById('form-title');

            signInForm.classList.toggle('active');
            signUpForm.classList.toggle('active');

            title.textContent = signInForm.classList.contains('active') ? 'Sign In' : 'Sign Up';
        }
    </script>
</body>

</html>
